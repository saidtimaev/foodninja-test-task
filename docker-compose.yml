
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: foodninja-test-task-app
    container_name: foodninja-test-task-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    networks:
      - foodninja_network

  queue-worker:
    image: foodninja-test-task-app 
    container_name: foodninja-test-task-queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    entrypoint: ["/var/www/Docker/entrypoint.sh", "queue"]
    depends_on:
      - app 
      - redis
    networks:
      - foodninja_network

  db:
    image: postgres:16-alpine
    container_name: foodninja-test-task-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - foodninja_network

  redis:
    image: redis:7-alpine
    container_name: foodninja-test-task-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - foodninja_network

networks:
  foodninja_network:
    driver: bridge

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local